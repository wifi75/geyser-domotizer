; Geyser Domotizer - firmware ESP32
; Scheda di riferimento per il deployment finale a batteria: Seeed Studio
; XIAO ESP32-C3 (vedi ../03-hardware-bom.md). L'ambiente esp32dev è per i
; test da banco su una scheda ESP32 DevKitV1 già disponibile (via USB),
; più ingombrante e "assetata" ma utile per validare il firmware subito.

[env:xiao-esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_4MB.csv

lib_deps =
    ESP32Async/ESPAsyncWebServer @ ^3.7.0
    ESP32Async/AsyncTCP @ ^3.3.2
    bblanchon/ArduinoJson @ ^7.2.0
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit INA219 @ ^1.2.3

extra_scripts = pre:tools/sync_web_assets.py

build_flags =
    -D CORE_DEBUG_LEVEL=1

[env:xiao-esp32c6]
; Il platform ufficiale "espressif32" sul registry PlatformIO non è più
; mantenuto da Espressif dal 2024: il board manifest di seeed_xiao_esp32c6
; dichiara solo "espidf" tra i framework supportati, anche se il core
; Arduino 3.x installato supporterebbe C6 (bug di manifest, non limite del
; chip). Il fork della community "pioarduino" tiene aggiornati sia il core
; sia i board manifest: vedi https://github.com/pioarduino/platform-espressif32
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_4MB.csv

lib_deps = ${env:xiao-esp32c3.lib_deps}
extra_scripts = ${env:xiao-esp32c3.extra_scripts}

build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D BOARD_XIAO_ESP32C6=1

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_4MB.csv

lib_deps = ${env:xiao-esp32c3.lib_deps}
extra_scripts = ${env:xiao-esp32c3.extra_scripts}

build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D BOARD_ESP32DEV=1
