<svg viewBox="0 0 700 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Schema di collegamento Geyser Domotizer</title>
<desc>Batteria 12V alimenta sia il percorso originale (scheda e pulsante invariati, fino al motore) sia il percorso nuovo: step-down 5V e partitore resistivo verso l'ESP32, che pilota un rele' 12V collegato direttamente ai terminali del motore/pompa.</desc>
<style>
  text { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  .th { font-size: 15px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; }
  .lg { font-size: 12px; font-weight: 400; fill: #2C2C2A; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .box-amber { fill: #FAEEDA; stroke: #BA7517; }
  .box-gray  { fill: #F1EFE8; stroke: #888780; }
  .box-green { fill: #EAF3DE; stroke: #639922; }
  .box-blue  { fill: #E6F1FB; stroke: #378ADD; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="700" height="630" fill="#ffffff"/>

<!-- Batteria -->
<g>
  <rect class="box-amber" x="270" y="30" width="170" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="355" y="56" text-anchor="middle" fill="#412402">Batteria 12V</text>
  <text class="ts" x="355" y="76" text-anchor="middle" fill="#854F0B">Geyser, Y-connector</text>
</g>

<!-- Scheda originale -->
<g>
  <rect class="box-gray" x="20" y="150" width="190" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="115" y="176" text-anchor="middle" fill="#2C2C2A">Scheda originale</text>
  <text class="ts" x="115" y="196" text-anchor="middle" fill="#5F5E5A">pulsante, invariata</text>
</g>

<!-- Step-down -->
<g>
  <rect class="box-green" x="280" y="150" width="140" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="350" y="176" text-anchor="middle" fill="#173404">Step-down 5V</text>
  <text class="ts" x="350" y="196" text-anchor="middle" fill="#3B6D11">alimenta ESP32</text>
</g>

<!-- Partitore -->
<g>
  <rect class="box-green" x="470" y="150" width="160" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="550" y="176" text-anchor="middle" fill="#173404">Partitore R</text>
  <text class="ts" x="550" y="196" text-anchor="middle" fill="#3B6D11">sensing batteria</text>
</g>

<!-- ESP32 -->
<g>
  <rect class="box-green" x="380" y="260" width="150" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="455" y="286" text-anchor="middle" fill="#173404">ESP32</text>
  <text class="ts" x="455" y="306" text-anchor="middle" fill="#3B6D11">XIAO / DevKitV1</text>
</g>

<!-- Relè -->
<g>
  <rect class="box-green" x="375" y="370" width="160" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="455" y="396" text-anchor="middle" fill="#173404">Relè 12V</text>
  <text class="ts" x="455" y="416" text-anchor="middle" fill="#3B6D11">pilotato da ESP32</text>
</g>

<!-- Motore -->
<g>
  <rect class="box-blue" x="365" y="480" width="180" height="64" rx="14" stroke-width="1.5"/>
  <text class="th" x="455" y="506" text-anchor="middle" fill="#042C53">Motore pompa</text>
  <text class="ts" x="455" y="526" text-anchor="middle" fill="#0C447C">+ diodo flyback 1N5408</text>
</g>

<!-- Frecce -->
<line x1="355" y1="94" x2="118" y2="148" class="arr" marker-end="url(#arrow)"/>
<line x1="352" y1="94" x2="350" y2="148" class="arr" marker-end="url(#arrow)"/>
<line x1="358" y1="94" x2="548" y2="148" class="arr" marker-end="url(#arrow)"/>

<path d="M440,50 H660 V402 H537" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="672" y="230" text-anchor="middle" fill="#5F5E5A" transform="rotate(90 672 230)">12V / GND → VCC relè</text>

<line x1="345" y1="214" x2="420" y2="258" class="arr" marker-end="url(#arrow)"/>
<line x1="548" y1="214" x2="485" y2="258" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="565" y="240" text-anchor="middle" fill="#5F5E5A">0–3.3V</text>

<line x1="455" y1="324" x2="455" y2="368" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="532" y="350" text-anchor="middle" fill="#5F5E5A">GPIO 3.3V</text>

<line x1="455" y1="434" x2="455" y2="478" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="518" y="460" text-anchor="middle" fill="#5F5E5A">COM/NO</text>

<path d="M115,214 V512 H363" class="arr" marker-end="url(#arrow)"/>

<!-- Legenda -->
<rect x="20" y="574" width="14" height="14" rx="3" class="box-amber" stroke-width="1"/>
<text class="lg" x="40" y="586">Batteria (esistente)</text>
<rect x="230" y="574" width="14" height="14" rx="3" class="box-gray" stroke-width="1"/>
<text class="lg" x="250" y="586">Percorso originale (invariato)</text>
<rect x="470" y="574" width="14" height="14" rx="3" class="box-green" stroke-width="1"/>
<text class="lg" x="490" y="586">Percorso nuovo (ESP32)</text>
<rect x="20" y="600" width="14" height="14" rx="3" class="box-blue" stroke-width="1"/>
<text class="lg" x="40" y="612">Pompa (destinazione comune)</text>
</svg>
